<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ title or "FeedSummary Viewer" }}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { padding-top: 12px; }
    .sidebar { max-height: calc(100vh - 24px); overflow: auto; }
    .content { max-height: calc(100vh - 24px); overflow: auto; }
    .summary-html h1, .summary-html h2, .summary-html h3 { margin-top: 1.2rem; }
    .summary-html pre { white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="container-fluid">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
