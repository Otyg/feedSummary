    \ numrerade listor.\n\nViktigt:\n- Du får använda P1/P2/P3 i desk-underlaget,\
    \ men det är ENBART intern prioriteringsmärkning.\n  Den får aldrig återges ordagrant\
    \ i slutlig lägesbild om den ska delas utanför gruppen.\n- Källor ska vara maskinläsbara:\
    \ varje händelsestycke ska avslutas med en egen rad som börjar exakt med \"SOURCES:\
    \ \".\n  Den raden ska innehålla en eller flera källor separerade med \"|\" (pipe),\
    \ utan extra text.\n  Exempel:\n  SOURCES: SVT|DN\n  SOURCES: Blekinge Läns Tidning\n\
    \nStruktur:\n1) Inledande stycke (3–6 meningar): kort lägesöversikt över vad som\
    \ dominerar i materialet, utan tolkningar.\n   Detta stycke får INTE ha en SOURCES-rad.\n\
    2) Därefter 5–12 händelsestycken (vardera 3–8 meningar).\n   - Varje stycke ska\
    \ handla om EN distinkt händelse/utveckling.\n   - Börja varje stycke med en intern\
    \ markör i brödtext:\n     \"P1 (Geo: Sverige): ...\" / \"P2 (Geo: Europa): ...\"\
    \ / \"P3 (Geo: Blekinge): ...\"\n   - Inkludera endast fakta: vad har rapporterats,\
    \ var, när, vilka aktörer, vad är nytt jämfört med tidigare.\n   - Om siffror/datum/citat\
    \ finns: ta med dem korrekt.\n   - Om uppgifter är obekräftade eller motsägelsefulla:\
    \ skriv det explicit som fakta om källornas osäkerhet\n     (t.ex. \"Uppgiften\
    \ är inte bekräftad av X\" eller \"Källorna skiljer sig åt kring ...\").\n   -\
    \ Slå ihop flera artiklar som beskriver samma händelse och ange att flera källor\
    \ stödjer.\n   - Avsluta stycket med exakt en källrad:\n     SOURCES: <källa1>|<källa2>|...\
    \  (utan dubbletter)\n3) Avslutande stycke (3–7 meningar): “Oklarheter och informationsluckor”\
    \ — vad som saknas för att bekräfta/avfärda uppgifter.\n   - ENDAST beskrivning\
    \ av luckor och osäkerheter; inga råd om vad man borde göra.\n   Detta stycke\
    \ får INTE ha en SOURCES-rad.\n\nArtiklar:\n{articles_corpus}\n"
  meta_system: 'Du arbetar på en Säkerhetsavdelning och sammanställer en faktabaserad
    lägesbild (sitrep) utifrån reportrarnas/handläggarnas desk-underlag.

    Du ska ENDAST sammanställa fakta som framgår av underlaget. Inga rekommendationer,
    inga åtgärdsförslag, inga spekulationer.

    Var neutral, tydlig och konsekvent i terminologi.

    Mycket viktigt: Eventuella interna markörer som "P1/P2/P3" eller "(Geo: ...)"
    får ALDRIG synas i sluttexten.

    Källraderna ("SOURCES: ...") är maskinläsbara hjälpdata; de ska inte kopieras
    rakt av i brödtexten, men kan användas för att bygga en källrad i slutet.

    '
  meta_user_template: "Skapa en faktabaserad lägesbild (sitrep) för tidsfönstret 1\
    \ dygn till 1 vecka baserat på desk-underlaget.\n\nFORMAT: Endast löpande text.\n\
    - Inga punktlistor.\n- Inga numrerade listor.\n- Inga interna markörer (P1/P2/P3)\
    \ och inga \"(Geo: ...)\" i sluttexten.\n- Kopiera inte \"SOURCES:\"-raderna i\
    \ brödtexten.\n\nInnehållskrav:\n- Endast fakta som framgår av underlaget.\n-\
    \ Inga rekommendationer, inga råd, inga \"bör\", inga förslag på åtgärder.\n-\
    \ Om information är osäker: beskriv osäkerheten sakligt (vem som säger vad, vad\
