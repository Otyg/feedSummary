    '
  batch_user_template: "Du får en bunt artiklar som tillsammans täcker ungefär en vecka. Skriv ett internt desk-underlag (omvärldsbrief) för cybersäkerhet/dataskydd/threat intelligence.\n\nFORMAT: Endast löpande text. Inga punktlistor, inga numrerade listor.\n\nViktigt:\n- Du får använda P1/P2/P3 i desk-underlaget, men det är ENBART intern prioriteringsmärkning. Den får aldrig återges ordagrant i slutlig text om den ska delas utanför gruppen.\n- Källor ska vara maskinläsbara: varje händelsestycke ska avslutas med en egen rad som börjar exakt med \"SOURCES: \". Den raden ska innehålla en eller flera källor separerade med \"|\" (pipe), utan extra text.\n\nFokus för urval:\n- Incidenter/intrång, ransomware, utpressning, dataläckor.\n- Sårbarheter: rapporterade, utnyttjade, exploiteringskedjor, patch-status om det uttryckligen står i materialet.\n- Kampanjer/aktörer: APT, kriminella grupper, statliga aktörer (endast om källorna säger det), infrastrukturer, TTPs (t.ex. phishing, supply chain) när det framgår.\n- Dataskydd/regulatorik: myndighetsbeslut, sanktioner, lagstiftning, större domar.\n\nStruktur:\n1) Inledande stycke (3–6 meningar): kort veckolägesöversikt över vad som dominerar i materialet, utan tolkningar. Detta stycke får INTE ha en SOURCES-rad.\n2) Därefter 8–16 händelsestycken (vardera 3–9 meningar).\n   - Varje stycke ska handla om EN distinkt händelse eller EN sammanhållen utveckling under veckan.\n   - Om samma incident/kampanj återkommer flera dagar: beskriv vad som var känt tidigt i veckan och vad som tillkom senare.\n   - Börja varje stycke med intern markör: \"P1: ...\" / \"P2: ...\" / \"P3: ...\" (inga geo-krav).\n   - Inkludera endast fakta: vad har rapporterats, när, var (om relevant), vilka aktörer, vilken typ av händelse, vad som är nytt jämfört med tidigare rapportering, och vilken osäkerhet som uttrycks av källorna.\n   - Om uppgifter är obekräftade eller motsägelsefulla: skriv det explicit som fakta om källornas osäkerhet.\n   - Avsluta stycket med exakt en källrad: SOURCES: <källa1>|<källa2>|...\n3) Avslutande stycke (3–8 meningar): “Oklarheter och informationsluckor” — vad som saknas för att bekräfta/avfärda uppgifter. Inga råd om vad man borde göra. Detta stycke får INTE ha en SOURCES-rad.\n\nArtiklar:\n{articles_corpus}\n"
  meta_system: 'Du arbetar på en Säkerhetsavdelning och sammanställer en faktabaserad veckolägesbild (sitrep) med fokus på cybersäkerhet, dataskydd och threat intelligence, baserat på desk-underlag.

