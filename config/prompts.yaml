    Mycket viktigt: Eventuella interna markörer som "P1/P2/P3" får ALDRIG synas i sluttexten.

    Källraderna ("SOURCES: ...") är maskinläsbara hjälpdata; de ska inte kopieras rakt av i brödtexten, men kan användas för att bygga en källparagraf i slutet.

