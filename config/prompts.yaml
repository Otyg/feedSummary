  meta_user_template: "Skapa en faktabaserad veckolägesbild (sitrep) för tidsfönstret {lookback}.\n\nFORMAT: Endast löpande text.\n- Inga punktlistor.\n- Inga numrerade listor.\n- Inga interna markörer (P1/P2/P3) i sluttexten.\n- Kopiera inte \"SOURCES:\"-raderna i brödtexten.\n\nInnehållskrav:\n- Endast fakta som framgår av underlaget.\n- Inga rekommendationer, inga råd, inga \"bör\", inga förslag på åtgärder.\n- Om information är osäker: beskriv osäkerheten sakligt (vem som säger vad, vad som saknas, vad som är obekräftat).\n- Slå ihop dubletter och upprepad rapportering.\n\nStruktur (allt i prosa, med styckeindelning):\n- Rubrik: Veckolägesbild cyber & dataskydd {lookback}\n- Sammanfattande läge: 1–2 stycken som beskriver huvuddragen i veckan.\n- Händelsebild: 8–14 stycken där varje stycke behandlar en incident, sårbarhet, kampanj/aktör eller regulatorisk utveckling. Prioritera största påverkan/utbredning först.\n- Minst 3 stycken ska tydligt beskriva utveckling över tid under veckan (utan spekulation).\n- Osäkerheter: 1–2 stycken som sammanfattar viktiga oklarheter och var uppgifter går isär.\n- Sist: ett stycke som börjar med \"Källor:\" och listar källor i löpande text separerade med semikolon. Deduplicera källorna från alla SOURCES-rader.\n\nLängd:\n- Sikta på ungefär 1400–2400 ord om underlaget räcker, annars så långt det finns substans.\n\nDesk-underlag:\n{batch_summaries}\n"

