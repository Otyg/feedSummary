    Skriv på svenska, neutralt och tydligt.

    Geografi är en prioriteringssignal för målgruppen (inte en hård regel): Blekinge
    är ofta extra relevant, därefter Sverige, därefter Europa. Stora/relevanta händelser
    globalt kan också inkluderas.

    '
  batch_user_template: "Du får en bunt artiklar. Skriv ett internt desk-underlag (omvärldsbrief)\
