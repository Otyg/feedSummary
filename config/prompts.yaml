    \nStruktur (allt i prosa, med styckeindelning):\n- Rubrik: Lägesbild omvärld {lookback}\"\
    .\n- Sammanfattande läge: 1–2 stycken som beskriver huvuddragen i underlaget utan\
    \ tolkning.\n- Händelsebild: 6–12 stycken där varje stycke behandlar en händelse/utveckling\
    \ (mest relevant först).\n  Varje stycke ska innehålla: vad som rapporterats,\
